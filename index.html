<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중국어 복음 카드</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="복음카드">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0d1117;
  font-family: 'Noto Sans KR', 'Noto Sans SC', sans-serif;
  color: #e6edf3;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 16px 60px;
}
.header {
  width: 100%; max-width: 600px;
  padding: 22px 0 14px;
  border-bottom: 1px solid #21262d;
  margin-bottom: 22px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left .sub  { font-size: 10px; color: #484f58; letter-spacing: 3px; margin-bottom: 4px; }
.header-left .title { font-size: 20px; font-weight: 700; background: linear-gradient(90deg,#79c0ff,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.back-btn {
  background: #21262d; border: 1px solid #30363d;
  color: #8b949e; border-radius: 8px;
  padding: 6px 14px; font-size: 12px; cursor: pointer;
  display: none; font-family: inherit;
}
.box { width:100%; max-width:600px; background:#161b22; border:1px solid #21262d; border-radius:12px; padding:14px 16px; margin-bottom:12px; }
.box-label { font-size:10px; color:#484f58; letter-spacing:2px; margin-bottom:10px; }
.filter-row { display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn { padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer; border:1px solid #30363d; background:transparent; color:#6b7280; font-family:inherit; }
.filter-btn.on-all  { border-color:#8b949e; background:rgba(139,148,158,0.12); color:#8b949e; }
.filter-btn.on-word { border-color:#a78bfa; background:rgba(167,139,250,0.12); color:#a78bfa; }
.filter-btn.on-sent { border-color:#fbbf24; background:rgba(251,191,36,0.12); color:#fbbf24; }
.unit-list { width:100%; max-width:600px; display:flex; flex-direction:column; gap:8px; }
.unit-item { display:flex; align-items:center; gap:14px; padding:13px 16px; background:#161b22; border:1px solid #21262d; border-radius:12px; cursor:pointer; transition:border-color 0.15s; }
.unit-item:hover { border-color:#388bfd; }
.unit-num { width:36px; height:36px; border-radius:9px; background:#21262d; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#8b949e; flex-shrink:0; }
.unit-info { flex:1; }
.unit-title { font-size:14px; font-weight:600; color:#e6edf3; margin-bottom:3px; }
.unit-sub { font-size:11px; color:#6b7280; }
.unit-counts { display:flex; flex-direction:column; gap:2px; align-items:flex-end; flex-shrink:0; }
.card-list { width:100%; max-width:600px; display:flex; flex-direction:column; gap:6px; }
.list-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#161b22; border:1px solid #21262d; border-radius:10px; }
.type-pill { font-size:10px; letter-spacing:1px; font-weight:700; border-radius:99px; padding:3px 10px; flex-shrink:0; }
.pill-word { color:#a78bfa; background:rgba(167,139,250,0.12); border:1px solid rgba(167,139,250,0.3); }
.pill-sent { color:#fbbf24; background:rgba(251,191,36,0.12); border:1px solid rgba(251,191,36,0.3); }
.list-hanzi { font-size:13px; color:#c9d1d9; flex:1; line-height:1.5; }
.list-speak { background:none; border:none; cursor:pointer; font-size:14px; color:#388bfd; padding:0 4px; flex-shrink:0; }
.list-star { background:none; border:none; cursor:pointer; font-size:15px; color:#30363d; padding:0; flex-shrink:0; }
.list-star.on { color:#fbbf24; }
#study-screen { width:100%; max-width:520px; display:none; }
.progress-row { display:flex; justify-content:space-between; font-size:11px; color:#6b7280; margin-bottom:6px; }
.progress-bar { height:3px; background:#21262d; border-radius:99px; margin-bottom:16px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#388bfd,#a78bfa); transition:width 0.35s; }
.badge-row { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
.card-star { background:none; border:none; cursor:pointer; font-size:17px; color:#30363d; padding:0; }
.card-star.on { color:#fbbf24; }
.study-card { background:#0d1117; border:1.5px solid #21262d; border-radius:20px; padding:32px 24px; min-height:200px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; margin-bottom:16px; user-select:none; }
.study-card.s1 { background:#161b22; border-color:#388bfd; }
.study-card.s2 { background:#161b22; border-color:#a78bfa; }
.study-card.ok { border-color:#3fb950; }
.study-card.ng { border-color:#f85149; }
.card-section { width:100%; text-align:center; }
.sec-label { font-size:10px; color:#484f58; letter-spacing:3px; margin-bottom:10px; }
.card-divider { width:100%; height:1px; background:#21262d; }
.hanzi-text { color:#e6edf3; line-height:1.7; }
.pinyin-text { color:#79c0ff; line-height:1.7; }
.korean-text { color:#c9d1d9; line-height:1.8; }
.speak-card-btn { background:rgba(56,139,253,0.08); border:1px solid #30363d; border-radius:99px; padding:6px 18px; color:#484f58; font-size:13px; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.speak-card-btn.playing { background:rgba(56,139,253,0.2); border-color:#388bfd; color:#79c0ff; }
.tap-hint { font-size:11px; color:#30363d; }
.dots { display:flex; justify-content:center; gap:8px; margin-bottom:14px; }
.dot { height:8px; border-radius:99px; background:#21262d; transition:all 0.25s; }
.result-btns { display:flex; gap:10px; }
.wrong-btn, .ok-btn { flex:1; padding:14px; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.wrong-btn { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#ff7b72; }
.ok-btn { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); color:#56d364; }
.result-fb { text-align:center; padding:13px; border-radius:12px; font-size:14px; font-weight:600; display:none; }
.result-fb.ok { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.25); color:#56d364; }
.result-fb.ng { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.25); color:#ff7b72; }
#done-screen { width:100%; max-width:420px; text-align:center; padding:40px 24px; background:#161b22; border-radius:18px; border:1px solid #21262d; display:none; }
.done-emoji { font-size:44px; margin-bottom:14px; }
.done-title { font-size:18px; font-weight:700; margin-bottom:6px; }
.done-sub { font-size:12px; color:#6b7280; margin-bottom:28px; }
.score-row { display:flex; justify-content:center; gap:36px; margin-bottom:32px; }
.score-num { font-size:34px; font-weight:700; }
.score-lbl { font-size:11px; color:#484f58; }
.done-btns { display:flex; flex-direction:column; gap:10px; }
.done-btn { padding:13px; border-radius:10px; font-size:14px; cursor:pointer; font-family:inherit; }
.btn-wrong { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.25); color:#ff7b72; font-weight:600; }
.btn-star { background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.25); color:#fbbf24; font-weight:600; }
.btn-retry { background:rgba(56,139,253,0.1); border:1px solid rgba(56,139,253,0.25); color:#79c0ff; }
.btn-home { background:#21262d; border:1px solid #30363d; color:#8b949e; }
.start-btn { width:100%; max-width:600px; padding:16px; border-radius:12px; background:linear-gradient(135deg,rgba(56,139,253,0.2),rgba(167,139,250,0.15)); border:1px solid rgba(56,139,253,0.4); color:#79c0ff; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:10px; font-family:inherit; }
.star-start-btn { width:100%; max-width:600px; padding:13px; border-radius:12px; background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.25); color:#fbbf24; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:8px; font-family:inherit; display:none; }
.wrong-home-btn { width:100%; max-width:600px; padding:13px; border-radius:12px; background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.25); color:#ff7b72; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:8px; font-family:inherit; display:none; }
.section-label { width:100%; max-width:600px; font-size:10px; color:#484f58; letter-spacing:2px; margin-bottom:8px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation:fadeUp 0.2s ease; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="sub">GOSPEL CHINESE · 중국어로 복음 전하기</div>
    <div class="title">福音学习卡片</div>
  </div>
  <button class="back-btn" id="back-btn" onclick="goHome()">← 홈</button>
</div>

<!-- 홈 -->
<div id="home-screen">
  <div class="box">
    <div class="box-label">학습 순서</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;">
      <span style="color:#e6edf3;font-weight:600;">① 한자</span>
      <span style="color:#30363d;">→</span>
      <span style="color:#79c0ff;font-weight:600;">② 병음</span>
      <span style="color:#30363d;">→</span>
      <span style="color:#56d364;font-weight:600;">③ 한국어</span>
      <span style="color:#30363d;">→</span>
      <span style="color:#8b949e;">알았다 / 몰랐다 &nbsp;·&nbsp; 🔊 발음 듣기</span>
    </div>
  </div>
  <div class="box">
    <div class="box-label">카드 종류</div>
    <div class="filter-row">
      <button class="filter-btn on-all" onclick="setFilter('all',this)">전체 (<span id="cnt-all">0</span>)</button>
      <button class="filter-btn" onclick="setFilter('word',this)">단어 (<span id="cnt-word">0</span>)</button>
      <button class="filter-btn" onclick="setFilter('sentence',this)">문장 (<span id="cnt-sent">0</span>)</button>
    </div>
  </div>
  <button class="star-start-btn" id="star-start-btn" onclick="startStudy('star')">⭐ 즐겨찾기 학습 (<span id="star-cnt">0</span>장)</button>
  <button class="wrong-home-btn" id="wrong-home-btn" onclick="startStudy('wrong')">📚 오답 노트 복습 (<span id="wrong-home-cnt">0</span>장)</button>
  <button class="start-btn" onclick="startStudy('all-filter')">⚡ 전체 랜덤 학습 (<span id="start-cnt">0</span>장)</button>
  <div class="section-label" style="margin-top:8px;">유닛별 학습</div>
  <div class="unit-list" id="unit-list"></div>
</div>

<!-- 유닛 상세 -->
<div id="unit-screen" style="display:none; width:100%; max-width:600px;">
  <div class="box" style="margin-bottom:8px;">
    <div class="box-label" id="unit-detail-label"></div>
    <div style="font-size:16px;font-weight:700;color:#e6edf3;" id="unit-detail-title"></div>
    <div style="font-size:12px;color:#6b7280;margin-top:3px;" id="unit-detail-sub"></div>
  </div>
  <button class="star-start-btn" id="unit-star-btn" onclick="startStudy('unit-star')">⭐ 즐겨찾기 학습 (<span id="unit-star-cnt">0</span>장)</button>
  <button class="start-btn" id="unit-start-btn" onclick="startStudy('unit')">▶ 이 유닛 학습 (<span id="unit-cnt">0</span>장)</button>
  <div class="section-label">카드 목록</div>
  <div class="card-list" id="unit-card-list"></div>
</div>

<!-- 학습 -->
<div id="study-screen">
  <div class="progress-row">
    <span id="prog-label">1/10</span>
    <span><span id="ok-cnt" style="color:#3fb950;">✓0</span> <span id="ng-cnt" style="color:#f85149;">✗0</span></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="badge-row">
    <span class="type-pill" id="card-badge"></span>
    <button class="card-star" id="card-star" onclick="toggleStarCur()">★</button>
    <span style="font-size:11px;color:#484f58;" id="card-unit-label"></span>
  </div>
  <div class="study-card" id="study-card" onclick="nextStep()">
    <div class="card-section">
      <div class="sec-label">한 자</div>
      <div class="hanzi-text" id="c-hanzi"></div>
    </div>
    <button class="speak-card-btn" id="speak-btn" onclick="speakCur(event)">🔊 듣기</button>
    <div class="card-divider" id="div1" style="display:none"></div>
    <div class="card-section fade-up" id="sec-py" style="display:none">
      <div class="sec-label">병 음</div>
      <div class="pinyin-text" id="c-py"></div>
    </div>
    <div class="card-divider" id="div2" style="display:none"></div>
    <div class="card-section fade-up" id="sec-kr" style="display:none">
      <div class="sec-label">한국어</div>
      <div class="korean-text" id="c-kr"></div>
    </div>
    <div class="tap-hint" id="tap-hint">탭 → 병음 확인</div>
  </div>
  <div class="dots" id="dots">
    <div class="dot" id="d0" style="width:24px;background:#388bfd;"></div>
    <div class="dot" id="d1" style="width:8px;"></div>
    <div class="dot" id="d2" style="width:8px;"></div>
  </div>
  <div class="result-btns" id="result-btns" style="display:none;">
    <button class="wrong-btn" onclick="handleResult(false)">✗ 몰랐다</button>
    <button class="ok-btn" onclick="handleResult(true)">✓ 알았다</button>
  </div>
  <div class="result-fb" id="result-fb"></div>
</div>

<!-- 완료 -->
<div id="done-screen">
  <div class="done-emoji" id="done-emoji">🎉</div>
  <div class="done-title" id="done-title">학습 완료!</div>
  <div class="done-sub" id="done-sub"></div>
  <div class="score-row">
    <div><div class="score-num" style="color:#3fb950;" id="final-ok">0</div><div class="score-lbl">정답</div></div>
    <div><div class="score-num" style="color:#f85149;" id="final-ng">0</div><div class="score-lbl">오답</div></div>
  </div>
  <div class="done-btns">
    <button class="done-btn btn-wrong" id="d-wrong-btn" onclick="startStudy('wrong')" style="display:none;">📚 오답 노트 복습 (<span id="wrong-cnt2">0</span>장)</button>
    <button class="done-btn btn-star" id="d-star-btn" onclick="startStudy('star')" style="display:none;">⭐ 즐겨찾기 복습 (<span id="star-cnt2">0</span>장)</button>
    <button class="done-btn btn-retry" onclick="startStudy('retry')">🔄 처음부터 다시</button>
    <button class="done-btn btn-home" onclick="goHome()">← 홈으로</button>
  </div>
</div>

<script>
const UNITS = [
  {
    id:1, title:"天堂还是地狱？", korean:"천국입니까? 지옥입니까?",
    cards:[
      {t:"w", h:"天堂",   p:"tiāntáng",      k:"천국"},
      {t:"w", h:"地狱",   p:"dìyù",          k:"지옥"},
      {t:"w", h:"生活",   p:"shēnghuó",      k:"살다, 생활하다"},
      {t:"w", h:"幸福",   p:"xìngfú",        k:"행복하다"},
      {t:"w", h:"所以",   p:"suǒyǐ",         k:"그래서"},
      {t:"w", h:"努力",   p:"nǔlì",          k:"노력"},
      {t:"w", h:"可是",   p:"kěshì",         k:"그러나"},
      {t:"w", h:"不管",   p:"bùguǎn",        k:"~을 막론하고"},
      {t:"w", h:"或者",   p:"huòzhě",        k:"혹은, 또는"},
      {t:"w", h:"不幸",   p:"bùxìng",        k:"불행하다"},
      {t:"w", h:"迟早",   p:"chízǎo",        k:"조만간"},
      {t:"w", h:"面对",   p:"miànduì",       k:"~에 직면하다"},
      {t:"w", h:"死亡",   p:"sǐwáng",        k:"죽음, 사망하다"},
      {t:"w", h:"然而",   p:"rán'ér",        k:"하지만, 그런데"},
      {t:"w", h:"不仅仅", p:"bù jǐnjǐn",    k:"단지 ~만이 아니다"},
      {t:"w", h:"结束",   p:"jiéshù",        k:"끝나다"},
      {t:"w", h:"希望",   p:"xīwàng",        k:"원하다, 바라다"},
      {t:"w", h:"每个人", p:"měi gè rén",    k:"모든 사람, 누구나"},
      {t:"w", h:"一切",   p:"yīqiè",         k:"모든, 온갖"},
      {t:"s", h:"每个人都希望生活幸福。", p:"Měi gè rén dōu xīwàng shēnghuó xìngfú.", k:"모든 사람들은 행복하게 살기를 바랍니다."},
      {t:"s", h:"所以我们尽了一切的努力。", p:"Suǒyǐ wǒmen jìn le yīqiè de nǔlì.", k:"그래서 우리는 모든 노력을 다합니다."},
      {t:"s", h:"可是，不管生活得幸福或者不幸，我们迟早都要面对死亡。", p:"Kěshì, bùguǎn shēnghuó de xìngfú huòzhě bùxìng, wǒmen chízǎo dōu yào miànduì sǐwáng.", k:"그러나 행복하게 살든 혹은 불행하게 살든, 우리는 조만간 모두 죽음에 직면하게 됩니다."},
      {t:"s", h:"我们迟早都要面对死亡。", p:"Wǒmen chízǎo dōu yào miànduì sǐwáng.", k:"우리는 조만간 모두 죽음에 직면하게 됩니다."},
      {t:"s", h:"然而，死亡不仅仅是结束。", p:"Rán'ér, sǐwáng bù jǐnjǐn shì jiéshù.", k:"그런데 죽는다고 결코 끝나는 것이 아닙니다."},
    ]
  },
  {
    id:2, title:"天堂还是地狱？", korean:"천국입니까? 지옥입니까? (2)",
    cards:[
      {t:"w", h:"以后",    p:"yǐhòu",         k:"이후에"},
      {t:"w", h:"受到",    p:"shòudào",       k:"받다"},
      {t:"w", h:"审判",    p:"shěnpàn",       k:"심판"},
      {t:"w", h:"上帝",    p:"shàngdì",       k:"하나님"},
      {t:"w", h:"进入",    p:"jìnrù",         k:"들어가다"},
      {t:"w", h:"永远",    p:"yǒngyuǎn",      k:"영원히"},
      {t:"w", h:"乐园",    p:"lèyuán",        k:"낙원, 파라다이스"},
      {t:"w", h:"悲伤",    p:"bēishāng",      k:"슬픔"},
      {t:"w", h:"痛苦",    p:"tòngkǔ",        k:"고통"},
      {t:"w", h:"美丽",    p:"měilì",         k:"아름답다"},
      {t:"w", h:"可怕",    p:"kěpà",          k:"무섭다"},
      {t:"w", h:"火湖",    p:"huǒhú",         k:"불못"},
      {t:"s", h:"当我们死亡以后，我们会受到上帝的审判，", p:"Dāng wǒmen sǐwáng yǐhòu, wǒmen huì shòudào shàngdì de shěnpàn,", k:"우리가 죽은 후에는 하나님의 심판을 받게 됩니다."},

function updateCounts(){
  const all=allCards();
  setT('cnt-all',all.length); setT('cnt-word',all.filter(c=>c.t==='w').length); setT('cnt-sent',all.filter(c=>c.t==='s').length);
  setT('start-cnt',getFiltered(all).length);
  updateStarUI(); updateWrongUI();
}

function updateStarUI(){
  const cnt=starred.size;
  ['star-cnt','star-cnt2','unit-star-cnt'].forEach(id=>setT(id,cnt));
  const ssb=document.getElementById('star-start-btn'); if(ssb) ssb.style.display=cnt>0?'block':'none';
  const usb=document.getElementById('unit-star-btn'); if(usb) usb.style.display=cnt>0?'block':'none';
  const dsb=document.getElementById('d-star-btn'); if(dsb) dsb.style.display=cnt>0?'block':'none';
}

function updateWrongUI(){
  const cnt=wrongCards.length;
  ['wrong-home-cnt','wrong-cnt2'].forEach(id=>setT(id,cnt));
  const whb=document.getElementById('wrong-home-btn'); if(whb) whb.style.display=cnt>0?'block':'none';
  const dwb=document.getElementById('d-wrong-btn'); if(dwb) dwb.style.display=cnt>0?'block':'none';
}

function setFilter(type,btn){
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn');
  btn.classList.add(type==='all'?'on-all':type==='word'?'on-word':'on-sent');
  updateCounts(); if(currentUnitId!==null) renderUnitCards(currentUnitId);
}

// ══ 유닛 목록 ══
function renderUnitList(){
  const list=document.getElementById('unit-list'); list.innerHTML='';
  UNITS.forEach(u=>{
    const wc=u.cards.filter(c=>c.t==='w').length, sc=u.cards.filter(c=>c.t==='s').length;
    const div=document.createElement('div'); div.className='unit-item';
    div.innerHTML=`<div class="unit-num">${String(u.id).padStart(2,'0')}</div><div class="unit-info"><div class="unit-title">${u.title}</div><div class="unit-sub">${u.korean}</div></div><div class="unit-counts"><span style="color:#a78bfa;font-size:10px;">단어 ${wc}</span><span style="color:#fbbf24;font-size:10px;">문장 ${sc}</span></div>`;
    div.onclick=()=>showUnitScreen(u.id); list.appendChild(div);
  });
}

// ══ 유닛 상세 ══
function showUnitScreen(unitId){
  currentUnitId=unitId; const u=UNITS.find(u=>u.id===unitId);
  setT('unit-detail-label',`UNIT ${String(unitId).padStart(2,'0')}`);
  setT('unit-detail-title',u.title); setT('unit-detail-sub',u.korean);
  renderUnitCards(unitId);
  document.getElementById('home-screen').style.display='none';
  document.getElementById('unit-screen').style.display='block';
  document.getElementById('study-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('back-btn').style.display='block';
}

function renderUnitCards(unitId){
  const u=UNITS.find(u=>u.id===unitId);
  const cards=getFiltered(u.cards.map(c=>({...c,unitId:u.id,unitTitle:u.title})));
  setT('unit-cnt',cards.length);
  const list=document.getElementById('unit-card-list'); list.innerHTML='';
  cards.forEach((c,i)=>{
    const isW=c.t==='w'; const div=document.createElement('div'); div.className='list-item';
    const hEsc=c.h.replace(/'/g,"\\'");
    div.innerHTML=`<span class="type-pill ${isW?'pill-word':'pill-sent'}">${isW?'단어':'문장'}</span><span class="list-hanzi">${c.h}</span><button class="list-speak" onclick="speakText('${hEsc}')">🔊</button><button class="list-star ${starred.has(c.h)?'on':''}" id="us-${unitId}-${i}" onclick="toggleStar('${hEsc}',${unitId},${i})">★</button>`;
    list.appendChild(div);
  });
  updateStarUI();
}

// ══ TTS ══
function speakText(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  function go(){ const voices=window.speechSynthesis.getVoices(); const zh=voices.find(v=>v.lang.startsWith('zh')); const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.85; if(zh) u.voice=zh; window.speechSynthesis.speak(u); }
  window.speechSynthesis.getVoices().length>0?go():(window.speechSynthesis.onvoiceschanged=go);
}

function speakCur(e){
  if(e) e.stopPropagation();
  const c=studyCards[currentIdx]; if(!c) return;
  const btn=document.getElementById('speak-btn');
  window.speechSynthesis.cancel(); btn.textContent='🔊 재생중...'; btn.classList.add('playing');
  function go(){ const voices=window.speechSynthesis.getVoices(); const zh=voices.find(v=>v.lang.startsWith('zh')); const u=new SpeechSynthesisUtterance(c.h); u.lang='zh-CN'; u.rate=0.85; if(zh) u.voice=zh; u.onend=u.onerror=()=>{ btn.textContent='🔊 듣기'; btn.classList.remove('playing'); }; window.speechSynthesis.speak(u); }
  window.speechSynthesis.getVoices().length>0?go():(window.speechSynthesis.onvoiceschanged=go);
}

// ══ 즐겨찾기 ══
function toggleStar(hanzi,unitId,idx){
  starred.has(hanzi)?starred.delete(hanzi):starred.add(hanzi);
  const btn=document.getElementById(`us-${unitId}-${idx}`); if(btn) btn.className='list-star'+(starred.has(hanzi)?' on':'');
  updateStarUI();
}
function toggleStarCur(){ const c=studyCards[currentIdx]; if(!c) return; starred.has(c.h)?starred.delete(c.h):starred.add(c.h); document.getElementById('card-star').className='card-star'+(starred.has(c.h)?' on':''); updateStarUI(); }

// ══ 화면 전환 ══
function goHome(){
  currentUnitId=null;
  document.getElementById('home-screen').style.display='block';
  document.getElementById('unit-screen').style.display='none';
  document.getElementById('study-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('back-btn').style.display='none';
  updateCounts(); renderUnitList();
}
function showStudyScreen(){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('unit-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('study-screen').style.display='block';
  document.getElementById('back-btn').style.display='block';
}
function showDoneScreen(){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('unit-screen').style.display='none';
  document.getElementById('study-screen').style.display='none';
  document.getElementById('done-screen').style.display='block';
  document.getElementById('back-btn').style.display='none';
}

// ══ 학습 시작 ══
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function startStudy(mode){
  studyMode=mode;
  if(mode==='all-filter') studyCards=shuffle(getFiltered(allCards()));
  else if(mode==='unit'){ const u=UNITS.find(u=>u.id===currentUnitId); studyCards=shuffle(getFiltered(u.cards.map(c=>({...c,unitId:u.id,unitTitle:u.title})))); }
  else if(mode==='unit-star'){ const u=UNITS.find(u=>u.id===currentUnitId); studyCards=shuffle(u.cards.filter(c=>starred.has(c.h)).map(c=>({...c,unitId:u.id,unitTitle:u.title}))); }
  else if(mode==='star') studyCards=shuffle(allCards().filter(c=>starred.has(c.h)));
  else if(mode==='wrong') studyCards=shuffle([...wrongCards]);
  else if(mode==='retry') studyCards=shuffle(lastCards);
  if(!studyCards.length) return;
  lastCards=[...studyCards];
  currentIdx=0; currentStep=0; currentResult=null;
  score={correct:0,wrong:0};
  showStudyScreen(); renderCard();
}

// ══ 카드 렌더 ══
function renderCard(){
  const c=studyCards[currentIdx]; if(!c) return;
  const pct=(currentIdx/studyCards.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  setT('prog-label',`${currentIdx+1} / ${studyCards.length}`);
  setT('ok-cnt','✓'+score.correct); setT('ng-cnt','✗'+score.wrong);
  const isW=c.t==='w';
  const badge=document.getElementById('card-badge'); badge.textContent=isW?'단어':'문장'; badge.className='type-pill '+(isW?'pill-word':'pill-sent');
  document.getElementById('card-star').className='card-star'+(starred.has(c.h)?' on':'');
  setT('card-unit-label',`Unit ${c.unitId}`);
  const len=c.h.length; const fs=isW?'42px':len>20?'14px':len>12?'17px':'21px';
  document.getElementById('c-hanzi').style.cssText=`font-size:${fs};font-weight:${isW?'700':'500'};letter-spacing:${isW?'3px':'0.5px'};`;
  setT('c-hanzi',c.h); setT('c-py',c.p); setT('c-kr',c.k);
  setStep(0);
  document.getElementById('result-btns').style.display='none';
  document.getElementById('result-fb').style.display='none';
  document.getElementById('study-card').className='study-card';
  document.getElementById('speak-btn').textContent='🔊 듣기';
  document.getElementById('speak-btn').classList.remove('playing');
}

function setStep(s){
  currentStep=s;
  document.getElementById('sec-py').style.display=s>=1?'block':'none';
  document.getElementById('div1').style.display=s>=1?'block':'none';
  document.getElementById('sec-kr').style.display=s>=2?'block':'none';
  document.getElementById('div2').style.display=s>=2?'block':'none';
  const hint=document.getElementById('tap-hint');
  if(s===0){hint.textContent='탭 → 병음 확인';hint.style.display='block';}
  else if(s===1){hint.textContent='탭 → 한국어 확인';hint.style.display='block';}
  else{hint.style.display='none';}
  document.getElementById('study-card').className='study-card'+(s===1?' s1':s===2?' s2':'');
  for(let i=0;i<3;i++){const d=document.getElementById('d'+i);d.style.width=i===s?'24px':'8px';d.style.background=i<=s?'#388bfd':'#21262d';}
  if(s===2) document.getElementById('result-btns').style.display='flex';
}

function nextStep(){ if(currentResult) return; if(currentStep<2) setStep(currentStep+1); }

// ══ 정답 처리 ══
function handleResult(ok){
  currentResult=ok; const c=studyCards[currentIdx];
  if(!ok){ if(!wrongSet.has(c.h)){wrongSet.add(c.h);wrongCards.push(c);} }
  else{ if(wrongSet.has(c.h)){wrongSet.delete(c.h);wrongCards=wrongCards.filter(w=>w.h!==c.h);} }
  ok?score.correct++:score.wrong++;
  updateWrongUI();
  const fb=document.getElementById('result-fb'); fb.style.display='block'; fb.textContent=ok?'✓ 정답!':'✗ 다음에 다시!'; fb.className='result-fb '+(ok?'ok':'ng');
  document.getElementById('result-btns').style.display='none';
  document.getElementById('study-card').className='study-card '+(ok?'ok':'ng');
  setTimeout(()=>{ currentResult=null; if(currentIdx+1>=studyCards.length) showResult(); else{currentIdx++;renderCard();} },700);
}

// ══ 결과 ══
function showResult(){
  setT('final-ok',score.correct); setT('final-ng',score.wrong);
  setT('done-sub',`총 ${score.correct+score.wrong}장 학습`);
  document.getElementById('done-emoji').textContent=score.wrong===0?'🎉':score.correct>score.wrong?'👍':'📚';
  updateWrongUI(); updateStarUI(); showDoneScreen();
}
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW 오류:',e));
  });
}
